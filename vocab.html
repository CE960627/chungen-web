/* --- 遮罩效果核心 CSS (視覺絕對穩定防爆版) --- */
.reveal-wrapper {
    position: relative;
    transition: all 0.2s;
    border-radius: 0.5rem;
    /* 💡 核心修正 1：加上 border-box，Padding 再多也不會爆開螢幕 */
    box-sizing: border-box; 
    padding: 0.5rem 1rem; 
    /* 💡 核心修正 2：改用 Grid 疊加，確保隱藏前後高度完全一致，徹底根除跳針 */
    display: grid;
    grid-template-columns: 1fr;
    align-items: center;
    width: 100%; 
    min-height: 2.8rem; 
    vertical-align: middle;
    cursor: default;
    user-select: none;
    overflow: hidden;
}

.reveal-wrapper.masked-mode {
    cursor: pointer;
    background-color: #f1f5f9;
    border: 1.5px solid #e2e8f0;
}

.reveal-text, .reveal-overlay {
    /* 💡 核心修正 3：將文字與提示疊在同一個空間 */
    grid-area: 1 / 1 / 2 / 2;
    transition: opacity 0.2s ease-in-out;
}

.reveal-text {
    /* 💡 修正 4：開啟時文字位置一樣靠左 */
    text-align: left; 
    font-weight: 700;
    width: 100%;
    line-height: 1.4;
    white-space: nowrap; /* 💡 修正 5：表格內維持水平一行 */
}

/* 穩定核心：僅改變透明度，物理空間保留防止表格縮放 */
.reveal-wrapper.is-hidden .reveal-text {
    opacity: 0;
    pointer-events: none;
}

.reveal-overlay {
    display: none;
    align-items: center;
    /* 💡 修正 6：隱藏時提示文字 (主動回想等) 置中 */
    justify-content: center; 
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    pointer-events: none;
    white-space: nowrap;
}

.reveal-wrapper.is-hidden .reveal-overlay { 
    display: flex; 
}

/* 高級感微呼吸燈 */
@keyframes alluring-glow-only {
    0%, 100% { box-shadow: 0 0 4px rgba(79, 70, 229, 0.1); border-color: rgba(79, 70, 229, 0.4); }
    50% { box-shadow: 0 0 10px rgba(79, 70, 229, 0.25); border-color: rgba(79, 70, 229, 0.8); }
}
.alluring-glow {
    animation: alluring-glow-only 2s infinite ease-in-out;
}

                    questionsHTML += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 transition-all hover:shadow-md animate-fade-in-up mb-10" id="q-card-${q.id}">
                        <div class="flex gap-3 mb-4">
                            <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-indigo-100 text-indigo-700 font-bold rounded-full">${idx + 1}</span>
                            <div class="flex-1">
                                <p class="text-lg text-slate-800 font-medium leading-relaxed">${questionText}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 ml-11">
                            ${q.options.map(opt => {
                                const prefix = opt.charAt(0);
                                return `<button onclick="handleSelect(this, ${q.id}, '${prefix}')" id="btn-${q.id}-${prefix}" class="option-btn text-left px-4 py-3 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium">
                                    <span>${opt}</span>
                                    <i id="icon-${q.id}-${prefix}" class="w-5 h-5"></i>
                                </button>`;
                            }).join('')}
                        </div>

                        <div class="mt-8 border-t border-slate-100 pt-6" id="action-area-${q.id}">
                            <div class="flex justify-center md:justify-start ml-11">
                                <button onclick="checkResult(${q.id})" id="check-btn-${q.id}" class="px-10 py-2.5 rounded-full font-bold text-white transition-all bg-slate-300 cursor-not-allowed" disabled>檢查答案</button>
                            </div>
                            
                            <div id="explanation-${q.id}" class="hidden p-6 md:p-8 rounded-2xl w-full border mt-4">
                                <div class="flex items-center gap-2 font-bold mb-6 text-xl" id="result-header-${q.id}"></div>
                                <div class="text-slate-700 leading-relaxed">${q.explanation}</div>
                            </div>
                        </div>
                    </div>`;
                });
                container.innerHTML = questionsHTML;
                container.dataset.qid = String(currentQuestions[0].id);
                lucide.createIcons();
            }

            // 恢復使用者的選擇狀態（這部分邏輯不變）
            currentQuestions.forEach(q => {
                const prefix = userAnswers[q.id];
                if (prefix) {
                    const btn = document.getElementById(`btn-${q.id}-${prefix}`);
                    if (btn) updateSelectionVisuals(btn, q.id, prefix);
                }
                if (resultsChecked[q.id]) {
                    showResultVisuals(q.id);
                }
            });
        }
        function handleSelect(btnElement, qId, prefix) {
            if (resultsChecked[qId]) return;

            userAnswers[qId] = prefix;
            updateSelectionVisuals(btnElement, qId, prefix);
        }

        function updateSelectionVisuals(btnElement, qId, prefix) {
            const allBtns = document.querySelectorAll(`#q-card-${qId} .option-btn`);
            allBtns.forEach(btn => {
                btn.classList.remove('selected', 'bg-indigo-50', 'border-indigo-500', 'text-indigo-700', 'ring-1', 'ring-indigo-500');
                btn.classList.add('border-slate-200', 'text-slate-600');
            });

            const targetBtn = document.getElementById(`btn-${qId}-${prefix}`);
            if(targetBtn) {
                targetBtn.classList.remove('border-slate-200', 'text-slate-600', 'hover:bg-slate-50');
                targetBtn.classList.add('selected', 'bg-indigo-50', 'border-indigo-500', 'text-indigo-700', 'ring-1', 'ring-indigo-500');
            }

            const blank = document.getElementById(`blank-${qId}`);
            if(blank) blank.textContent = prefix;

            const checkBtn = document.getElementById(`check-btn-${qId}`);
            if(checkBtn) {
                checkBtn.disabled = false;
                checkBtn.classList.remove('bg-slate-300', 'cursor-not-allowed');
                checkBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700', 'shadow-md');
            }
        }

        function checkResult(qId) {
            resultsChecked[qId] = true;
            showResultVisuals(qId);
        }

        function showResultVisuals(qId) {
            const userAns = userAnswers[qId];
            const correctAns = currentQuestions.find(q => q.id === qId).answer;
            const isCorrect = userAns === correctAns;

            const allBtns = document.querySelectorAll(`#q-card-${qId} .option-btn`);
            allBtns.forEach(btn => {
                btn.classList.add('disabled');
                btn.onclick = null;
                if (!btn.id.includes(userAns) && !btn.id.includes(correctAns)) {
                    btn.classList.add('muted');
                }
            });

            const correctBtn = document.getElementById(`btn-${qId}-${correctAns}`);
            if (correctBtn) {
                correctBtn.className = "option-btn correct text-left px-4 py-3 rounded-lg border flex items-center justify-between ring-1 ring-green-500";
                const icon = document.getElementById(`icon-${qId}-${correctAns}`);
                if(icon) {
                    icon.setAttribute('data-lucide', 'check-circle');
                    icon.classList.add('text-green-600');
                }
            }

            if (!isCorrect && userAns) {
                const wrongBtn = document.getElementById(`btn-${qId}-${userAns}`);
                if (wrongBtn) {
                    wrongBtn.className = "option-btn wrong text-left px-4 py-3 rounded-lg border flex items-center justify-between ring-1 ring-red-300";
                    const icon = document.getElementById(`icon-${qId}-${userAns}`);
                    if(icon) {
                        icon.setAttribute('data-lucide', 'x-circle');
                        icon.classList.add('text-red-500');
                    }
                }
            }

            const blank = document.getElementById(`blank-${qId}`);
            if(blank) {
                blank.className = isCorrect 
                    ? "inline-block border-b-2 w-20 mx-1 text-center font-bold text-green-600 border-green-500"
                    : "inline-block border-b-2 w-20 mx-1 text-center font-bold text-red-600 border-red-500";
            }

            const checkBtn = document.getElementById(`check-btn-${qId}`);
            if(checkBtn) checkBtn.style.display = 'none';

            const explanationDiv = document.getElementById(`explanation-${qId}`);
            const resultHeader = document.getElementById(`result-header-${qId}`);
            
            if(explanationDiv && resultHeader) {
                explanationDiv.classList.remove('hidden');
                if (isCorrect) {
                    explanationDiv.classList.add('bg-green-50', 'border-green-100');
                    resultHeader.innerHTML = `<span class="text-green-700 flex items-center gap-1"><i data-lucide="check-circle" class="w-5 h-5"></i> Correct!</span>`;
                } else {
                    explanationDiv.classList.add('bg-red-50', 'border-red-100');
                    resultHeader.innerHTML = `<span class="text-red-700 flex items-center gap-1"><i data-lucide="x-circle" class="w-5 h-5"></i> Wrong. Answer: ${correctAns}</span>`;
                }
                lucide.createIcons({ root: explanationDiv });
            }
            lucide.createIcons({ root: document.getElementById(`q-card-${qId}`) });
        }

        // 💡 邏輯優化：切換分頁時預設關閉「背單字模式」
        function switchTab(tabId) {
            currentTab = tabId;
            
            // 切換分頁時預設關閉背單字模式
            isMasked = false;
            updateMaskBtnUI();
            
            // 移除所有按鈕的 active 狀態
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 為當前點擊的按鈕加入 active (這會觸發我們剛寫的 CSS)
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.add('active');
            }
            
            render();
        }

        // 💡 核心手術 1：更新「背單字模式」按鈕的視覺狀態
        function updateMaskBtnUI() {
            const maskBtn = document.getElementById('mask-toggle');
            if (!maskBtn) return; // 防止抓不到按鈕報錯
            
            if(isMasked) {
                // 當模式「開啟」：按鈕變黃色加厚框，並移除呼吸燈 (以免干擾背誦)
                maskBtn.className = "flex items-center gap-2 px-4 py-2.5 rounded-lg font-bold text-sm transition-all bg-amber-100 text-amber-800 border-amber-400 border-2";
                maskBtn.innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i> <span>背單字模式：開啟</span>`;
            } else {
                // 當模式「關閉」：恢復白色背景、靛藍邊框，並啟動「精品微呼吸燈」吸引點擊
                maskBtn.className = "flex items-center gap-2 px-4 py-2.5 rounded-lg font-bold text-sm transition-all bg-white text-indigo-700 border-indigo-600 border-2 alluring-glow";
                maskBtn.innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i> <span>背單字模式：關閉</span>`;
            }
            lucide.createIcons({ root: maskBtn }); // 重新渲染按鈕內的圖示
        }

        // 💡 核心手術 2：切換模式主邏輯 (不重新渲染 HTML，保留捲動位置)
        function toggleMask() {
            isMasked = !isMasked; // 切換布林值
            updateMaskBtnUI();    // 立即更新右上角按鈕外觀
            
            // 抓取頁面上當前所有的遮罩元素
            const wrappers = document.querySelectorAll('.reveal-wrapper');
            wrappers.forEach(el => {
                if (isMasked) {
                    // 若模式開啟，為所有框框加上「灰色背景」與「隱藏狀態」
                    el.classList.add('masked-mode', 'is-hidden');
                } else {
                    // 若模式關閉，移除所有框框的遮罩效果，恢復全顯示
                    el.classList.remove('masked-mode', 'is-hidden');
                }
            });
            // 這種做法「完全不會重新載入表格」，所以你的表格捲動到哪裡，就會停在哪裡。
        }

        // 💡 核心手術 3：點擊單一單字顯現/隱藏的邏輯
        function toggleSingleReveal(el) {
            if (!isMasked) return; // 只有在「背單字模式」開啟時，點擊才有反應
            
            // 透過 toggle 技術切換 is-hidden。
            // 配合我們先前寫的 CSS，隱藏時透明度 0，顯示時透明度 1，
            // 因為 Grid 佈局鎖定了高度，所以這裡切換時完全不會跳針。
            el.classList.toggle('is-hidden');
        }

        // 初始執行
        render();

    </script>
</body>
</html>
